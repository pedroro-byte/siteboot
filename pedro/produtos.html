<!DOCTYPE html>

<head>
  <meta charset="UTF-8">

  <title>Produtos</title>

  <link rel="stylesheet" href="style.css">

<body>

<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">

    <a class="navbar-brand fw-bold" href="index.html">
      MóveisDecor
    </a>

    <div class="navbar-nav ms-auto">
      <a class="nav-link" href="index.html">Início</a>
      <a class="nav-link" href="contato.html">Contato</a>
    </div>

  </div>
</nav>

<div class="container my-5">

  <h2 class="mb-4">Nossos Produtos</h2>

  <div class="row g-4">

    <div class="col-md-4">
      <div class="card h-100 shadow-sm">

        <img
          src="imagens/sofa.jpg"
          class="card-img-top"
          alt="Sofá">

        <div class="card-body">

          <h5 class="card-title">Sofá 3 Lugares</h5>

          <p class="card-text text-muted">
            Sofá confortável em tecido cinza.
          </p>

          <p class="preco">R$ 1.899,00</p>

          <a href="#" class="btn btn-loja">
            Comprar
          </a>

        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card h-100 shadow-sm">

        <img
          src="imagens/mesa.jpg"
          class="card-img-top"
          alt="Mesa">

        <div class="card-body">

          <h5 class="card-title">Mesa de Jantar</h5>

          <p class="card-text text-muted">
            Mesa de madeira para 6 pessoas.
          </p>

          <p class="preco">R$ 1.250,00</p>

          <a href="#" class="btn btn-loja">
            Comprar
          </a>

        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card h-100 shadow-sm">

        <img
          src="imagens/poltrona.jpg"
          class="card-img-top"
          alt="Poltrona">

        <div class="card-body">

          <h5 class="card-title">Poltrona Retrô</h5>

          <p class="card-text text-muted">
            Design clássico e muito conforto.
          </p>

          <p class="preco">R$ 749,00</p>

          <a href="#" class="btn btn-loja">
            Comprar
          </a>

        </div>
      </div>
    </div>

  </div>

<footer>
  <p class="mb-0">
    © 2025 MóveisDecor
  </p>
